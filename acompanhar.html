<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#155B67">
<title>Acompanhamento — Diagnóstika Engenharia</title>
<link rel="icon" type="image/png" href="assets/icon.png">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--teal:#155B67;--teal-dk:#0D3C44;--turq:#00B4AC;--lime:#8DB72A;--text:#1A2E31;--text2:#4A6568;--gray:#F0F4F5;--gray2:#E0EAEC;--gray3:#A8BFC2;--gray4:#5A7A7E;--red:#C00000;--green:#1B8A4A;--amber:#D4A24C}
html,body{font-family:'Segoe UI',system-ui,sans-serif;background:linear-gradient(135deg,#0D3C44,#155B67,#00B4AC);min-height:100vh;color:var(--text);font-size:15px;line-height:1.5}
.wrap{max-width:560px;margin:0 auto;padding:20px 16px 40px}
.card{background:#fff;border-radius:14px;padding:22px;box-shadow:0 8px 32px rgba(0,0,0,.25);margin-bottom:14px}
.brand{text-align:center;margin-bottom:14px;color:#fff}
.brand img{height:48px;filter:brightness(0) invert(1);margin-bottom:6px}
.proto{display:inline-block;background:var(--teal);color:#fff;padding:8px 14px;border-radius:10px;font-family:'SF Mono',Menlo,Consolas,monospace;font-size:14px;font-weight:800;letter-spacing:.5px}
.status{display:inline-block;padding:5px 12px;border-radius:14px;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.4px;color:#fff;margin-left:6px}
.s-aberta{background:#C00000}.s-em_andamento{background:#E65100}.s-resolvida{background:#1B8A4A}.s-fechada{background:#5A7A7E}
h2{font-size:18px;color:var(--text);margin:14px 0 4px}
.meta{font-size:12px;color:var(--text2)}
.section-lbl{font-size:10.5px;font-weight:800;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin:16px 0 4px}
.bloco{background:var(--gray);border-left:3px solid var(--teal);padding:11px 14px;border-radius:0 8px 8px 0;font-size:13.5px;line-height:1.5;white-space:pre-wrap}
.bloco.prog{background:rgba(13,60,68,.08);border-left-color:#0D3C44}
.bloco.resp{background:rgba(27,138,74,.08);border-left-color:var(--green)}
.bloco.del{background:rgba(192,0,0,.08);border-left-color:var(--red)}
.fotos{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:6px;margin-top:6px}
.fotos img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:6px;cursor:pointer;background:#000}
.loading{text-align:center;padding:40px;color:var(--text2)}
.err{color:var(--red);padding:30px;text-align:center;font-size:14px;font-weight:600}
.foot{text-align:center;color:#fff;font-size:11px;margin-top:18px;opacity:.85}
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.92);display:none;align-items:center;justify-content:center;z-index:1000;cursor:pointer}
.lightbox.open{display:flex}
.lightbox img{max-width:96%;max-height:96%;border-radius:6px}
</style>
</head>
<body>

<div class="wrap">
  <div class="brand">
    <img src="assets/logo-dark.png" alt="Diagnóstika" onerror="this.style.display='none'">
    <div style="font-size:11px;letter-spacing:.5px;text-transform:uppercase;opacity:.85;font-weight:600">Acompanhamento de Chamado</div>
  </div>
  <div class="card" id="content">
    <div class="loading">⏳ Carregando…</div>
  </div>
  <div class="foot">Diagnóstika Engenharia · CREA/SP</div>
</div>

<div class="lightbox" id="lb" onclick="this.classList.remove('open')"><img id="lb-img" src=""></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL='https://fimmjgdwhifsrrbreche.supabase.co';
const SUPABASE_ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpbW1qZ2R3aGlmc3JyYnJlY2hlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1NzU2NDIsImV4cCI6MjA5NTE1MTY0Mn0.eAmMS95M8BkfX3NCcOtHnhKWXy0jkvXwSGEoqv_Q21Q';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

const CONDOS = {
  'monte-carlo':'Edifício Monte Carlo','morada-morumbi':'Morada do Morumbi','portal-primavera':'Portal Primavera',
  'residencial-santa-clara':'Residencial Santa Clara','jardins-do-malta':'Jardins do Malta','condominio-teste':'Condomínio TESTE'
};
const cats={reforma:'🏗️ Reforma na unidade',duvida:'❓ Dúvida técnica',corretiva:'🔧 Problema na unidade',laudo:'📜 Solicitação de ART'};
const subtipos={reforma:'🏗️ Reforma na unidade',duvida:'❓ Dúvida técnica',corretiva:'🔧 Problema na unidade',art:'📜 Solicitação de ART à Diagnóstika'};
const statusLbl={aberta:'Aberta',em_andamento:'Em andamento',resolvida:'Resolvida',fechada:'Fechada'};

const id = new URLSearchParams(location.search).get('id');
if(!id){
  document.getElementById('content').innerHTML='<div class="err">⚠ Link inválido. Use o link de acompanhamento fornecido após o envio do chamado.</div>';
} else {
  carregar();
}

async function carregar(){
  try{
    const {data, error} = await sb.rpc('consultar_chamado_morador', {p_id:id});
    if(error) throw error;
    if(!data || data.erro){ throw new Error(data?.erro || 'Não encontrado'); }
    renderizar(data);
  }catch(e){
    document.getElementById('content').innerHTML='<div class="err">❌ '+(e.message||'Erro ao carregar')+'</div>';
  }
}

function fmtDt(s){ if(!s) return '—'; const d=new Date(s); return d.toLocaleDateString('pt-BR')+' '+d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}); }
function fmtBR(s){ if(!s) return '—'; const [y,m,d]=s.split('-'); return `${d}/${m}/${y}`; }

// Escapa HTML especial — usar em TODA interpolação de dados em template literals
function esc(s){
  if(s == null) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

// Monta URL pública pra fotos novas (storage) ou usa URL antiga base64
function getFotoUrl(a){
  if(!a) return '';
  if(typeof a === 'string') return a;
  if(a.storage_path) return 'https://fimmjgdwhifsrrbreche.supabase.co/storage/v1/object/public/chamados-morador/' + a.storage_path.split('/').map(encodeURIComponent).join('/');
  return a.url || '';
}

function renderizar(d){
  const fotos=Array.isArray(d.fotos)?d.fotos:[];
  const fotosMorador=fotos.filter(a=>(!a||typeof a==='string'||a.origem!=='diagnostika') && (!a || typeof a==='string' || a.tipo!=='documento'));
  const docsMorador=fotos.filter(a=>a && typeof a==='object' && a.tipo==='documento' && a.origem!=='diagnostika');
  const fotosDiag=fotos.filter(a=>a && typeof a==='object' && a.origem==='diagnostika' && a.tipo!=='documento');
  const html = `
    <div style="display:flex;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:6px">
      <span class="proto">📋 ${esc(d.protocolo||'—')}</span>
      <span class="status s-${d.status}">${statusLbl[d.status]||d.status}</span>
      ${renderAguardandoBadgeMorador(d)}
    </div>
    <h2>${esc(d.titulo||'—')}</h2>
    <div class="meta">${esc(CONDOS[d.condo_id]||d.condo_id)} · ${esc(subtipos[d.detalhes?.subtipo_morador]||cats[d.categoria]||d.categoria)} · enviado em ${fmtDt(d.created_at)}</div>
    <div class="meta">Por <b>${esc(d.morador_nome||'—')}</b> · ${esc(d.morador_apto||'—')}</div>

    ${d.deletada_em?`<div class="bloco del" style="margin-top:14px"><b>🗑 Este chamado foi cancelado/encerrado.</b></div>`:''}

    <div class="section-lbl">📝 Descrição</div>
    <div class="bloco">${esc(d.descricao||'(sem descrição)')}</div>

    ${fotosMorador.length?`<div class="section-lbl">📷 Fotos enviadas por você</div>
      <div class="fotos">${fotosMorador.map(a=>{const u=getFotoUrl(a);return `<img src="${u}" onclick="lb('${u}')">`;}).join('')}</div>`:''}

    ${docsMorador.length?`<div class="section-lbl">📎 Documentos enviados por você</div>
      <div style="background:var(--gray);border-radius:8px;padding:8px 10px">${docsMorador.map(doc=>`<div style="display:flex;align-items:center;gap:6px;padding:5px 0;font-size:13px"><span>📄</span><a href="${esc(getFotoUrl(doc))}" download="${esc(doc.nome||'documento')}" target="_blank" style="color:var(--teal);text-decoration:none;font-weight:600;flex:1;word-break:break-word">${esc(doc.nome||'arquivo')}</a></div>`).join('')}</div>`:''}

    ${d.data_programada?`
      <div class="section-lbl">📅 Programado pela Diagnóstika</div>
      <div class="bloco prog">
        <b>${d.tipo_programado||'Visita'} em ${fmtBR(d.data_programada)}${d.hora_programada?' às '+d.hora_programada.substring(0,5):''}</b>
        ${d.descricao_programada?'<div style="margin-top:6px">'+esc(d.descricao_programada)+'</div>':''}
        ${d.programado_em?`<div style="font-size:11px;color:var(--text2);margin-top:6px">Confirmado em ${fmtDt(d.programado_em)}${d.programado_por?' por '+d.programado_por:''}</div>`:''}
      </div>
    `:''}

    ${renderMensagensThread(d)}

    ${fotosDiag.length?`<div class="section-lbl">📎 Documentos / fotos da Diagnóstika</div>
      <div class="fotos">${fotosDiag.map(a=>{const u=getFotoUrl(a);return `<img src="${u}" onclick="lb('${u}')">`;}).join('')}</div>`:''}

    ${renderFormResposta(d)}

    <div style="margin-top:18px;text-align:center;font-size:11px;color:var(--text2)">
      Atualizado: ${fmtDt(d.updated_at||d.created_at)}<br>
      <button onclick="location.reload()" style="margin-top:8px;background:var(--teal);color:#fff;border:none;padding:8px 14px;border-radius:8px;font-weight:700;cursor:pointer">↻ Atualizar</button>
    </div>
  `;
  document.getElementById('content').innerHTML = html;
  window._demandaAtual = d;
}

function renderAguardandoBadgeMorador(d){
  if(!d) return '';
  if(d.deletada_em) return '';
  if(d.status === 'resolvida') return '<span style="background:#1B8A4A;color:#fff;padding:3px 9px;border-radius:10px;font-size:10px;font-weight:800;letter-spacing:.3px">✅ RESOLVIDA</span>';
  if(d.status === 'fechada')   return '<span style="background:#5A7A7E;color:#fff;padding:3px 9px;border-radius:10px;font-size:10px;font-weight:800;letter-spacing:.3px">🔒 FECHADA</span>';
  const msgs = Array.isArray(d.mensagens) ? d.mensagens : [];
  let ultimo = null;
  if(msgs.length) ultimo = msgs[msgs.length-1].autor;
  else if(d.resposta) ultimo = 'engenharia';
  if(!ultimo) return '<span style="background:#D97706;color:#fff;padding:3px 9px;border-radius:10px;font-size:10px;font-weight:800;letter-spacing:.3px">🛠 AGUARDANDO DIAGNÓSTIKA</span>';
  if(ultimo === 'engenharia') return '<span style="background:#7D3C98;color:#fff;padding:3px 9px;border-radius:10px;font-size:10px;font-weight:800;letter-spacing:.3px">👋 SUA VEZ DE RESPONDER</span>';
  return '<span style="background:#D97706;color:#fff;padding:3px 9px;border-radius:10px;font-size:10px;font-weight:800;letter-spacing:.3px">🛠 AGUARDANDO DIAGNÓSTIKA</span>';
}

function renderMensagensThread(d){
  const msgs = Array.isArray(d.mensagens) ? d.mensagens : [];
  const itens = [];
  // Resposta legacy (campo `resposta`) primeiro se existir e não estiver já no thread
  if(d.resposta && !msgs.some(m => m.texto === d.resposta)){
    itens.push({
      autor:'engenharia',
      autor_nome:d.respondido_por||'Diagnóstika',
      texto:d.resposta,
      em:d.respondido_em,
      anexos:[]
    });
  }
  msgs.forEach(m => itens.push(m));
  // ordena por data
  itens.sort((a,b) => new Date(a.em||0) - new Date(b.em||0));

  if(!itens.length){
    return '<div class="section-lbl">💬 Conversa</div><div class="bloco" style="color:var(--text2);font-style:italic">Ainda aguardando primeira resposta da engenharia.</div>';
  }

  const html = itens.map(m => {
    const isMorador = m.autor === 'morador';
    const cor = isMorador ? '#7D3C98' : '#1B8A4A';
    const bg  = isMorador ? 'rgba(125,60,152,.08)' : 'rgba(27,138,74,.08)';
    const anexHtml = (m.anexos||[]).length ? '<div style="margin-top:6px;display:flex;flex-wrap:wrap;gap:5px">'+m.anexos.map(a => {
      const url = getFotoUrl(a);
      const isImg = (a.tipo||'').startsWith('image/');
      return isImg ?
        `<img src="${url}" onclick="lb('${url}')" style="width:60px;height:60px;object-fit:cover;border-radius:5px;cursor:pointer">` :
        `<a href="${url}" target="_blank" style="display:inline-flex;align-items:center;gap:4px;background:#fff;border:1px solid #E5E7EB;padding:4px 8px;border-radius:6px;font-size:11px;color:${cor};text-decoration:none">📎 ${esc(a.nome||'arquivo').substring(0,30)}</a>`;
    }).join('')+'</div>' : '';
    return `<div style="background:${bg};border-left:3px solid ${cor};padding:10px 13px;border-radius:0 8px 8px 0;margin-bottom:8px">
      <div style="font-size:11px;color:${cor};font-weight:700;letter-spacing:.3px;margin-bottom:4px">${isMorador?'👤 '+esc(m.autor_nome||'Você'):'🛠 '+esc(m.autor_nome||'Diagnóstika')}${m.em?' · '+fmtDt(m.em):''}</div>
      <div style="font-size:13.5px;line-height:1.5;color:#111;white-space:pre-wrap">${esc(m.texto)}</div>
      ${anexHtml}
    </div>`;
  }).join('');

  return '<div class="section-lbl">💬 Conversa</div>'+html;
}

function renderFormResposta(d){
  if(d.deletada_em) return '';
  if(d.status === 'fechada') return '<div style="margin-top:14px;padding:12px;background:#F0F4F5;border-radius:8px;font-size:12px;color:var(--text2);text-align:center">🔒 Este chamado está fechado. Para retomar contato, abra um novo chamado.</div>';
  return `
    <div class="section-lbl">✏️ Sua resposta</div>
    <div style="background:rgba(125,60,152,.04);border:1.5px solid rgba(125,60,152,.2);border-radius:10px;padding:13px 14px">
      <textarea id="reply-text" placeholder="Adicione uma informação, tire uma dúvida ou envie fotos para a engenharia…" rows="3" style="width:100%;padding:10px 12px;border:1px solid #D1D5DB;border-radius:7px;font-size:13.5px;font-family:inherit;resize:vertical;outline:none;background:#fff" lang="pt-BR" spellcheck="true"></textarea>
      <div id="reply-anexos-preview" style="display:none;margin-top:8px;display:flex;flex-wrap:wrap;gap:5px"></div>
      <div style="display:flex;align-items:center;gap:8px;margin-top:10px;flex-wrap:wrap">
        <label style="background:#fff;border:1.5px solid #D1D5DB;padding:7px 11px;border-radius:7px;cursor:pointer;font-size:12px;font-weight:600;color:#7D3C98;display:inline-flex;align-items:center;gap:5px">
          📷 Foto / arquivo
          <input type="file" multiple accept="image/*,application/pdf" onchange="anexarRespMorador(this)" style="display:none">
        </label>
        <span id="reply-info" style="font-size:11px;color:var(--text2)"></span>
        <div style="flex:1"></div>
        <button onclick="enviarRespostaMorador()" id="btn-reply" style="background:#7D3C98;color:#fff;border:none;padding:9px 18px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer">Enviar resposta</button>
      </div>
    </div>
  `;
}

let _replyAnexos = [];

async function anexarRespMorador(input){
  const files = Array.from(input.files||[]);
  const info = document.getElementById('reply-info');
  if(info) info.textContent = 'Enviando '+files.length+' arquivo(s)…';
  for(const f of files){
    if(f.size > 10*1024*1024){ alert(f.name+' tem mais de 10MB — ignorado'); continue; }
    try{
      const ext = (f.name.split('.').pop()||'bin').toLowerCase();
      const uuid = (crypto.randomUUID?crypto.randomUUID():Date.now()+'-'+Math.random().toString(36).slice(2));
      const path = `respostas-morador/${id}/${uuid}.${ext}`;
      const { error } = await sb.storage.from('chamados-morador').upload(path, f, {cacheControl:'3600'});
      if(error) throw error;
      _replyAnexos.push({nome:f.name, storage_path:path, tipo:f.type, tamanho:f.size, origem:'morador'});
    }catch(e){ console.warn(e); alert('Falha em '+f.name+': '+e.message); }
  }
  if(info) info.textContent = _replyAnexos.length+' anexo(s) prontos';
  // preview
  const prev = document.getElementById('reply-anexos-preview');
  if(prev){
    prev.style.display = _replyAnexos.length ? 'flex' : 'none';
    prev.innerHTML = _replyAnexos.map((a,i)=>`<div style="background:#fff;border:1px solid #E5E7EB;padding:4px 8px;border-radius:6px;font-size:11px;display:inline-flex;align-items:center;gap:5px">📎 ${esc(a.nome).substring(0,28)} <button onclick="_replyAnexos.splice(${i},1);anexarRespMorador({files:[]});" style="background:none;border:none;color:#C00000;cursor:pointer;font-weight:700">×</button></div>`).join('');
  }
}

async function enviarRespostaMorador(){
  const txt = document.getElementById('reply-text').value.trim();
  if(!txt && !_replyAnexos.length){ alert('Escreva algo ou anexe um arquivo.'); return; }
  if(txt.length > 0 && txt.length < 3){ alert('Texto muito curto.'); return; }
  const btn = document.getElementById('btn-reply');
  if(btn){ btn.disabled = true; btn.textContent = 'Enviando…'; }
  try{
    const { data, error } = await sb.rpc('responder_chamado_morador', {
      p_id: id,
      p_texto: txt || '(anexo enviado)',
      p_nome: window._demandaAtual?.morador_nome || 'Morador',
      p_anexos: _replyAnexos
    });
    if(error) throw error;
    if(data?.erro) throw new Error(data.erro);
    _replyAnexos = [];
    location.reload();
  }catch(e){
    if(btn){ btn.disabled = false; btn.textContent = 'Enviar resposta'; }
    alert('Erro ao enviar: '+(e.message||e));
  }
}

function lb(url){
  document.getElementById('lb-img').src=url;
  document.getElementById('lb').classList.add('open');
}
</script>
</body>
</html>
