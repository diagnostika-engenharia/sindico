<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#155B67">
<title>Acompanhamento — Diagnóstika Engenharia</title>
<link rel="icon" type="image/png" href="assets/icon.png">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--teal:#155B67;--teal-dk:#0D3C44;--turq:#00B4AC;--lime:#8DB72A;--text:#1A2E31;--text2:#4A6568;--gray:#F0F4F5;--gray2:#E0EAEC;--gray3:#A8BFC2;--gray4:#5A7A7E;--red:#C00000;--green:#1B8A4A;--amber:#D4A24C}
html,body{font-family:'Segoe UI',system-ui,sans-serif;background:linear-gradient(135deg,#0D3C44,#155B67,#00B4AC);min-height:100vh;color:var(--text);font-size:15px;line-height:1.5}
.wrap{max-width:560px;margin:0 auto;padding:20px 16px 40px}
.card{background:#fff;border-radius:14px;padding:22px;box-shadow:0 8px 32px rgba(0,0,0,.25);margin-bottom:14px}
.brand{text-align:center;margin-bottom:14px;color:#fff}
.brand img{height:48px;filter:brightness(0) invert(1);margin-bottom:6px}
.proto{display:inline-block;background:var(--teal);color:#fff;padding:8px 14px;border-radius:10px;font-family:'SF Mono',Menlo,Consolas,monospace;font-size:14px;font-weight:800;letter-spacing:.5px}
.status{display:inline-block;padding:5px 12px;border-radius:14px;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.4px;color:#fff;margin-left:6px}
.s-aberta{background:#C00000}.s-em_andamento{background:#E65100}.s-resolvida{background:#1B8A4A}.s-fechada{background:#5A7A7E}
h2{font-size:18px;color:var(--text);margin:14px 0 4px}
.meta{font-size:12px;color:var(--text2)}
.section-lbl{font-size:10.5px;font-weight:800;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin:16px 0 4px}
.bloco{background:var(--gray);border-left:3px solid var(--teal);padding:11px 14px;border-radius:0 8px 8px 0;font-size:13.5px;line-height:1.5;white-space:pre-wrap}
.bloco.prog{background:rgba(13,60,68,.08);border-left-color:#0D3C44}
.bloco.resp{background:rgba(27,138,74,.08);border-left-color:var(--green)}
.bloco.del{background:rgba(192,0,0,.08);border-left-color:var(--red)}
.fotos{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:6px;margin-top:6px}
.fotos img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:6px;cursor:pointer;background:#000}
.loading{text-align:center;padding:40px;color:var(--text2)}
.err{color:var(--red);padding:30px;text-align:center;font-size:14px;font-weight:600}
.foot{text-align:center;color:#fff;font-size:11px;margin-top:18px;opacity:.85}
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.92);display:none;align-items:center;justify-content:center;z-index:1000;cursor:pointer}
.lightbox.open{display:flex}
.lightbox img{max-width:96%;max-height:96%;border-radius:6px}
</style>
</head>
<body>

<div class="wrap">
  <div class="brand">
    <img src="assets/logo-dark.png" alt="Diagnóstika" onerror="this.style.display='none'">
    <div style="font-size:11px;letter-spacing:.5px;text-transform:uppercase;opacity:.85;font-weight:600">Acompanhamento de Chamado</div>
  </div>
  <div class="card" id="content">
    <div class="loading">⏳ Carregando…</div>
  </div>
  <div class="foot">Diagnóstika Engenharia · CREA/SP 50.707.124-26</div>
</div>

<div class="lightbox" id="lb" onclick="this.classList.remove('open')"><img id="lb-img" src=""></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL='https://fimmjgdwhifsrrbreche.supabase.co';
const SUPABASE_ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpbW1qZ2R3aGlmc3JyYnJlY2hlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1NzU2NDIsImV4cCI6MjA5NTE1MTY0Mn0.eAmMS95M8BkfX3NCcOtHnhKWXy0jkvXwSGEoqv_Q21Q';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

const CONDOS = {
  'monte-carlo':'Edifício Monte Carlo','morada-morumbi':'Morada do Morumbi','portal-primavera':'Portal Primavera',
  'residencial-santa-clara':'Residencial Santa Clara','jardins-do-malta':'Jardins do Malta','condominio-teste':'Condomínio TESTE'
};
const cats={reforma:'🏗️ Reforma na unidade',duvida:'❓ Dúvida técnica',corretiva:'🔧 Problema na unidade'};
const statusLbl={aberta:'Aberta',em_andamento:'Em andamento',resolvida:'Resolvida',fechada:'Fechada'};

const id = new URLSearchParams(location.search).get('id');
if(!id){
  document.getElementById('content').innerHTML='<div class="err">⚠ Link inválido. Use o link de acompanhamento fornecido após o envio do chamado.</div>';
} else {
  carregar();
}

async function carregar(){
  try{
    const {data, error} = await sb.rpc('consultar_chamado_morador', {p_id:id});
    if(error) throw error;
    if(!data || data.erro){ throw new Error(data?.erro || 'Não encontrado'); }
    renderizar(data);
  }catch(e){
    document.getElementById('content').innerHTML='<div class="err">❌ '+(e.message||'Erro ao carregar')+'</div>';
  }
}

function fmtDt(s){ if(!s) return '—'; const d=new Date(s); return d.toLocaleDateString('pt-BR')+' '+d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}); }
function fmtBR(s){ if(!s) return '—'; const [y,m,d]=s.split('-'); return `${d}/${m}/${y}`; }

function renderizar(d){
  const fotos=Array.isArray(d.fotos)?d.fotos:[];
  const fotosMorador=fotos.filter(a=>!a || typeof a==='string' || a.origem!=='diagnostika');
  const fotosDiag=fotos.filter(a=>a && typeof a==='object' && a.origem==='diagnostika');
  const html = `
    <div style="display:flex;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:6px">
      <span class="proto">📋 ${d.protocolo||'—'}</span>
      <span class="status s-${d.status}">${statusLbl[d.status]||d.status}</span>
    </div>
    <h2>${d.titulo||'—'}</h2>
    <div class="meta">${CONDOS[d.condo_id]||d.condo_id} · ${cats[d.categoria]||d.categoria} · enviado em ${fmtDt(d.created_at)}</div>
    <div class="meta">Por <b>${d.morador_nome||'—'}</b> · Unidade ${d.morador_apto||'—'}</div>

    ${d.deletada_em?`<div class="bloco del" style="margin-top:14px"><b>🗑 Este chamado foi cancelado/encerrado.</b></div>`:''}

    <div class="section-lbl">📝 Descrição</div>
    <div class="bloco">${(d.descricao||'(sem descrição)').replace(/</g,'&lt;')}</div>

    ${fotosMorador.length?`<div class="section-lbl">📷 Fotos enviadas por você</div>
      <div class="fotos">${fotosMorador.map(a=>{const u=typeof a==='string'?a:a.url;return `<img src="${u}" onclick="lb('${u}')">`;}).join('')}</div>`:''}

    ${d.data_programada?`
      <div class="section-lbl">📅 Programado pela Diagnóstika</div>
      <div class="bloco prog">
        <b>${d.tipo_programado||'Visita'} em ${fmtBR(d.data_programada)}${d.hora_programada?' às '+d.hora_programada.substring(0,5):''}</b>
        ${d.descricao_programada?'<div style="margin-top:6px">'+d.descricao_programada.replace(/</g,'&lt;')+'</div>':''}
        ${d.programado_em?`<div style="font-size:11px;color:var(--text2);margin-top:6px">Confirmado em ${fmtDt(d.programado_em)}${d.programado_por?' por '+d.programado_por:''}</div>`:''}
      </div>
    `:''}

    ${d.resposta?`
      <div class="section-lbl">💬 Resposta da Engenharia</div>
      <div class="bloco resp">${d.resposta.replace(/</g,'&lt;')}
        ${d.respondido_em?`<div style="font-size:11px;color:var(--text2);margin-top:6px">${fmtDt(d.respondido_em)}${d.respondido_por?' · '+d.respondido_por:''}</div>`:''}
      </div>
    `:'<div class="section-lbl">💬 Resposta da Engenharia</div><div class="bloco" style="color:var(--text2);font-style:italic">Ainda aguardando análise técnica. Você será contatado(a) por WhatsApp.</div>'}

    ${fotosDiag.length?`<div class="section-lbl">📎 Documentos / fotos da Diagnóstika</div>
      <div class="fotos">${fotosDiag.map(a=>{const u=typeof a==='string'?a:a.url;return `<img src="${u}" onclick="lb('${u}')">`;}).join('')}</div>`:''}

    <div style="margin-top:18px;text-align:center;font-size:11px;color:var(--text2)">
      Atualizado: ${fmtDt(d.updated_at||d.created_at)}<br>
      <button onclick="location.reload()" style="margin-top:8px;background:var(--teal);color:#fff;border:none;padding:8px 14px;border-radius:8px;font-weight:700;cursor:pointer">↻ Atualizar</button>
    </div>
  `;
  document.getElementById('content').innerHTML = html;
}

function lb(url){
  document.getElementById('lb-img').src=url;
  document.getElementById('lb').classList.add('open');
}
</script>
</body>
</html>
